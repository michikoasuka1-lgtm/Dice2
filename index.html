<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}
h1{margin-top:0;color:#333}
#dice{
    width:140px;
    height:140px;
    margin:20px auto;
    border-radius:20px;
    border:4px solid #333;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
}
.rolling{
    animation:spin .25s linear infinite;
}
@keyframes spin{
    from{transform:rotate(0deg) scale(1);}
    to{transform:rotate(360deg) scale(1.08);}
}
button{
    border:none;
    background:#2a5298;
    color:white;
    padding:14px 28px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}
button:hover{opacity:.9}
#result{
    margin-top:18px;
    font-size:20px;
}
.footer{
    margin-top:18px;
    color:#666;
    font-size:12px;
}
</style>
</head>
<body>
<div class="card">
<h1>🎲 Dice Roller</h1>
<p>สุ่มลูกเต๋า 1 ลูก จาก 5 สี</p>

<div id="dice"></div>

<button onclick="rollDice()">ทอยลูกเต๋า</button>

<div id="result"></div>

<div class="footer">
สี: เขียว • ส้ม • ขาว • เหลือง • น้ำเงิน
</div>
</div>

<script>
const colors=[
 {name:"เขียว",color:"green"},
 {name:"ส้ม",color:"orange"},
 {name:"ขาว",color:"white"},
 {name:"เหลือง",color:"yellow"},
 {name:"น้ำเงิน",color:"dodgerblue"}
];

const faces=[1,2,3,1,2,""];

function rand(arr){
 return arr[Math.floor(Math.random()*arr.length)];
}

function rollDice(){
 const dice=document.getElementById("dice");
 const result=document.getElementById("result");

 dice.classList.add("rolling");

 const anim=setInterval(()=>{
   const c=rand(colors);
   const f=rand(faces);
   dice.style.background=c.color;
   dice.textContent=f;
 },80);

 setTimeout(()=>{
   clearInterval(anim);
   dice.classList.remove("rolling");

   const c=rand(colors);
   const f=rand(faces);

   dice.style.background=c.color;
   dice.textContent=f;

   result.innerHTML=
   "สี: <b>"+c.name+"</b><br>หน้า: <b>"+(f===""?"ว่าง":f)+"</b>";
 },1800);
}

rollDice();
</script>
</body>
</html>
